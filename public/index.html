<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>逗包用户广场 - 维护中</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
      max-width: 500px;
    }
    .logo {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      font-size: 60px;
    }
    h1 {
      color: white;
      font-size: 32px;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff3cd;
      color: #856404;
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 14px;
      margin-bottom: 25px;
    }
    .status::before {
      content: '';
      width: 10px;
      height: 10px;
      background: #ffc107;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    p {
      color: #666;
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .contact {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid #eee;
    }
    .contact-title {
      font-size: 14px;
      color: #999;
      margin-bottom: 15px;
    }
    .footer {
      margin-top: 30px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎭</div>
    <h1>逗包用户广场</h1>
    <div class="card">
      <div class="status">🔧 系统维护中</div>
      <p>亲爱的用户，您好！</p>
      <p>逗包用户广场正在进行系统维护，暂时无法访问。</p>
      <p>维护期间，您可以正常使用豆包 APP，不受影响。</p>
      <p>感谢您的理解与支持！</p>
      <div class="contact">
        <div class="contact-title">如有问题，请联系管理员</div>
        <p style="font-size: 14px; color: #999;">预计恢复时间：待定</p>
      </div>
    </div>
    <div class="footer">© 2024 逗包用户广场</div>
  </div>
</body>
</html>
