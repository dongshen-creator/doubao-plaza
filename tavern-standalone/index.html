<style>
*{box-sizing:border-box}body,html{height:100%;overflow:hidden}.message-bubble{max-width:78%;word-break:break-word}
@media(max-width:767px){.message-bubble{max-width:88%}}.chat-scroll::-webkit-scrollbar{width:4px}
.chat-scroll::-webkit-scrollbar-track{background:transparent}.chat-scroll::-webkit-scrollbar-thumb{background:#c1c8d4;border-radius:999px}
.chat-scroll{scrollbar-width:thin;scrollbar-color:#c1c8d4 transparent}.dark .chat-scroll::-webkit-scrollbar-thumb{background:#4a4a5e}
.copy-btn{opacity:0;transition:opacity .2s}.msg-group:hover .copy-btn{opacity:1}@media(hover:none){.copy-btn{opacity:.6}}
.drawer-backdrop.active{opacity:1;pointer-events:auto}
.stream-cursor::after{content:'';display:inline-block;width:2px;height:1em;background:#165DFF;margin-left:2px;animation:blink .8s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}.input-area.dragging{border-color:#165DFF;background:#f0f5ff}
@media(max-width:767px){.header-btn-text{display:none}.header-btn{padding:6px 8px}}
.toast-container{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{pointer-events:auto;display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);font-size:13px;font-weight:500;animation:toastIn .25s;white-space:nowrap;max-width:90vw}
.toast-success{background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46}.toast-error{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
.toast-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
.dark .toast-success{background:#064E3B;border-color:#065F46;color:#A7F3D0}.dark .toast-error{background:#7F1D1D;border-color:#991B1B;color:#FECACA}
.dark .toast-info{background:#1E3A5F;border-color:#1E40AF;color:#BFDBFE}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:767px){.drawer-panel{width:85vw;max-width:320px}}
.char-active{border-left:3px solid #165DFF;background:rgba(22,77,255,.08)}.dark .char-active{background:rgba(22,77,255,.18)}
pre{border-radius:8px;overflow-x:auto;margin:6px 0}pre code{font-size:13px;line-height:1.45}.msg-content p{margin:4px 0}
.msg-content ul,.msg-content ol{padding-left:20px;margin:4px 0}.msg-content blockquote{border-left:3px solid #165DFF;padding-left:10px;color:#6b7280;margin:6px 0}
.dark .msg-content blockquote{color:#9ca3af}.msg-content table{border-collapse:collapse;margin:6px 0;font-size:13px}
.msg-content th,.msg-content td{border:1px solid #d1d5db;padding:4px 10px}.dark .msg-content th,.dark .msg-content td{border-color:#374151}
.msg-content a{color:#165DFF;text-decoration:underline}.token-bar{height:4px;border-radius:2px;background:#e5e7eb;overflow:hidden}
.token-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.ctx-btn{font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid #d1d5db;cursor:pointer;transition:all .2s}
.ctx-btn:hover{background:#e5e7eb}.dark .ctx-btn{border-color:#4b5563;color:#9ca3af}.dark .ctx-btn:hover{background:#374151}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.dark .modal{background:#2a2a3e;color:#e5e7eb}.modal-sm{max-width:400px}.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.modal-title{font-size:17px;font-weight:700}.modal-close{margin-left:auto;background:none;border:none;padding:4px 8px;border-radius:8px;cursor:pointer;color:#9ca3af;font-size:18px}
.modal-close:hover{background:#f3f4f6;color:#374151}.dark .modal-close:hover{background:#3a3a4e}
.selected-char{background:rgba(22,77,255,.1);border-color:#165DFF!important}
.model-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:999px;transition:all .3s;vertical-align:middle}
.model-status.idle{background:transparent;color:rgba(255,255,255,.5)}.model-status.loading{background:rgba(255,255,255,.15);color:#fff}
.model-status.ready{background:rgba(5,150,105,.2);color:#6ee7b7}.model-status.error{background:rgba(239,68,68,.15);color:#fca5a5}
.status-dot{width:5px;height:5px;border-radius:999px;display:inline-block}.status-dot.idle{background:rgba(255,255,255,.4)}
.status-dot.loading{background:#fff;animation:pulse-dot 1.2s ease-in-out infinite}.status-dot.ready{background:#6ee7b7}.status-dot.error{background:#fca5a5}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}.status-progress{height:3px;border-radius:999px;background:rgba(22,77,255,.2);overflow:hidden;margin-top:1px}
.status-progress-bar{height:100%;border-radius:999px;background:#165DFF;transition:width .3s ease}
.quick-bar{display:flex;gap:6px;overflow-x:auto;padding:4px 0 2px;scrollbar-width:none}.quick-bar::-webkit-scrollbar{display:none}
.quick-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;border:1px solid #e5e7eb;background:#f9fafb;color:#4b5563;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;user-select:none}
.quick-chip:hover{border-color:#165DFF;color:#165DFF;background:#eff6ff}.dark .quick-chip{border-color:#374151;background:#2a2a3e;color:#9ca3af}
.dark .quick-chip:hover{border-color:#3b82f6;color:#93c5fd;background:rgba(59,130,246,.12)}.quick-chip.active{background:#165DFF;border-color:#165DFF;color:#fff}
.icon-btn{display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;height:40px;width:40px;flex-shrink:0}
.icon-btn:hover{border-color:#165DFF;color:#165DFF;background:#eff6ff}.dark .icon-btn{border-color:#4b5563;background:#2a2a3e;color:#9ca3af}
.dark .icon-btn:hover{border-color:#3b82f6;color:#93c5fd;background:rgba(59,130,246,.12)}.icon-btn.recording{background:#fee2e2;border-color:#ef4444;color:#dc2626;animation:rec-pulse 1.2s ease-in-out infinite}
@keyframes rec-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}
.tts-btn.playing{color:#165DFF;border-color:#165DFF}.dark .tts-btn.playing{color:#93c5fd;border-color:#3b82f6}
.search-bar{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#f9fafb;border-bottom:1px solid #e5e7eb}
.dark .search-bar{background:#2a2a3e;border-color:#374151}.search-bar input{flex:1;background:transparent;border:none;outline:none;font-size:12px;color:inherit}
.search-hit{background:#fde68a;border-radius:2px;padding:0 1px}.dark .search-hit{background:#a16207;color:#fff}.search-count{font-size:11px;color:#9ca3af}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:160px;overflow-y:auto;margin-top:6px;padding:4px;border:1px solid #e5e7eb;border-radius:8px;background:#fff}
.dark .emoji-grid{background:#1e1e2e;border-color:#374151}.emoji-grid button{font-size:18px;padding:4px;border-radius:6px;cursor:pointer;background:transparent;border:none;line-height:1}
.emoji-grid button:hover{background:#eff6ff}.dark .emoji-grid button:hover{background:rgba(59,130,246,.15)}.avatar-emoji{font-size:18px;line-height:1}
.stats-pop{font-size:11px;color:#6b7280;line-height:1.7}.dark .stats-pop{color:#9ca3af}.stats-pop b{color:#165DFF;font-weight:600}.dark .stats-pop b{color:#93c5fd}
.typing-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#165DFF;margin:0 1px;animation:typing-bounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.15s}.typing-dot:nth-child(3){animation-delay:.3s}.dark .typing-dot{background:#93c5fd}
@keyframes typing-bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-4px);opacity:1}}
.scroll-bottom-btn{position:absolute;right:16px;bottom:80px;width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid #e5e7eb;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6b7280;z-index:10}
.scroll-bottom-btn:hover{color:#165DFF;border-color:#165DFF}.dark .scroll-bottom-btn{background:#2a2a3e;border-color:#4b5563;color:#9ca3af}
.chat-img{max-width:240px;max-height:320px;border-radius:8px;display:block;margin:4px 0;cursor:zoom-in}
.chat-video{max-width:240px;max-height:320px;border-radius:8px;display:block;margin:4px 0}
.avatar-img{width:36px;height:36px;border-radius:50%;object-fit:cover}.avatar-img-lg{width:48px;height:48px;border-radius:50%;object-fit:cover}
.upload-img-btn{border:1px dashed #d1d5db;border-radius:8px;padding:4px 8px;font-size:11px;color:#9ca3af;cursor:pointer}
.upload-img-btn:hover{border-color:#165DFF;color:#165DFF;background:#eff6ff}.dark .upload-img-btn{border-color:#4b5563;color:#9ca3af}
.dark .upload-img-btn:hover{border-color:#3b82f6;color:#93c5fd;background:rgba(59,130,246,.12)}
.media-viewer{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.media-viewer img,.media-viewer video{max-width:90vw;max-height:90vh;border-radius:8px}
.char-avatar-img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.avatar-tab{padding:4px 12px;font-size:12px;border-radius:6px;border:1px solid #d1d5db;cursor:pointer;background:transparent}
.avatar-tab.active{background:#165DFF;color:#fff;border-color:#165DFF}.dark .avatar-tab{border-color:#4b5563;color:#9ca3af}
.dark .avatar-tab.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
</style>
</head>
<body class="bg-white dark:bg-[#1a1a2e] text-dark dark:text-gray-100 flex flex-col">
<div class="toast-container" id="toastContainer"></div>

<header class="bg-primary text-white px-3 md:px-4 py-2.5 md:py-3 shadow-md flex items-center justify-between shrink-0 select-none">
  <div class="flex items-center gap-2 min-w-0">
    <button id="menuToggle" class="md:hidden mr-1 p-1.5 rounded hover:bg-white/20 transition"><i class="fa fa-bars text-lg"></i></button>
    <i class="fa fa-venus-mars text-lg md:text-xl shrink-0"></i>
    <h1 class="text-base md:text-lg font-bold truncate">角色酒馆</h1>

  </div>
  <div class="flex items-center gap-1 md:gap-2">

    <button id="settingsBtn" class="header-btn bg-white/15 text-white px-2 md:px-3 py-1.5 rounded text-xs md:text-sm hover:bg-white/25 transition flex items-center gap-1" title="全局设置"><i class="fa fa-cog"></i><span class="header-btn-text hidden sm:inline">设置</span></button>
    <button id="newCharBtn" class="header-btn bg-white/20 text-white px-2 md:px-3 py-1.5 rounded text-xs md:text-sm hover:bg-white/30 transition flex items-center gap-1 font-semibold" title="新建角色"><i class="fa fa-plus"></i><span class="hidden sm:inline">角色</span></button>

</header>

<div class="flex-1 flex overflow-hidden relative">
  <div id="drawerBackdrop" class="drawer-backdrop fixed inset-0 bg-black/40 z-30 opacity-0 pointer-events-none transition-opacity md:!hidden"></div>
  <aside id="sidePanel" class="drawer-panel w-full md:w-60 lg:w-72 bg-neutral dark:bg-[#2a2a3e] shrink-0 flex flex-col border-r border-gray-100 dark:border-gray-700 md:static fixed left-0 top-0 bottom-0 z-40 -translate-x-full md:translate-x-0 transition-transform duration-300 shadow-lg md:shadow-sm">
    <div class="flex items-center justify-between md:hidden p-3 border-b border-gray-200 dark:border-gray-600">

    </div>

      </div>
    </div>
    <div id="chatContainer" class="flex-1 p-3 md:p-4 overflow-y-auto chat-scroll flex-col gap-3 md:gap-4 hidden"></div>

        <div class="flex gap-1.5 shrink-0">
          <button id="stopBtn" class="px-3 py-2 rounded-lg bg-red-50 dark:bg-red-900/30 text-red-500 dark:text-red-400 border border-red-200 dark:border-red-800 hover:bg-red-100 dark:hover:bg-red-900/50 transition hidden items-center justify-center h-[40px] w-[40px]" title="停止"><i class="fa fa-stop"></i></button>

<script>
// ===== marked compat =====
const markedParse = typeof marked!=='undefined' ? (typeof marked.parse==='function'?marked.parse:marked) : s=>s;

// ===== DATA =====
const STORAGE_KEY = 'tavern_data';
let data = loadData();
let currentCharId = null, isGenerating = false, abortController = null;

function loadData() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e){}
  return { characters: [], config: defaultConfig() };
}
function defaultConfig() {
  return { model:'deepseek-ai/deepseek-v4-flash', customModelName:'', apiBase:'https://integrate.api.nvidia.com/v1', apiKey:'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', temperature:0.7, topP:0.9, maxTokens:2048, ctxBudget:8192, sysPrompt:'', freqPenalty:0, dark:false };
}
function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ===== IMAGE BED =====
async function uploadToImageBed(file) {
  try {
    const f = new FormData(); f.append('file', file);
    const r = await fetch('https://img.remit.ee/api/upload', { method:'POST', body:f }).then(r=>r.json());
    if (r?.url) return r.url; if (r?.data?.url) return r.data.url; if (r?.data?.link) return r.data.link;
  } catch(e){}
  try {
    const f = new FormData(); f.append('image', file);
    const r = await fetch('https://img.scdn.io/api/v1.php', { method:'POST', body:f }).then(r=>r.json());
    if (r?.success && r.url) return r.url;
  } catch(e){}
  try {
    const f = new FormData(); f.append('smfile', file);
    const r = await fetch('https://sm.ms/api/v2/upload', { method:'POST', body:f }).then(r=>r.json());
    if (r?.success && r.data?.url) return r.data.url;
  } catch(e){}
  throw new Error('所有图床均不可用');
}

function switchAvatarTab(type) {
  document.getElementById('ceAvatarTabEmoji').classList.toggle('active', type==='emoji');
  document.getElementById('ceAvatarTabImage').classList.toggle('active', type==='image');
  document.getElementById('ceEmojiSection').classList.toggle('hidden', type!=='emoji');
  document.getElementById('ceImageSection').classList.toggle('hidden', type!=='image');
}

function createCharacter(name) {
  const c = { id:generateId(), name:name||'新角色', avatar:'🎭', avatarType:'emoji', description:'', personality:'', scenario:'', greeting:'', example:'', systemPrompt:'', background:'', messages:[], createdAt:Date.now() };
  data.characters.push(c); saveData(); return c;
}
function deleteCharacter(id) { data.characters = data.characters.filter(c => c.id!==id); if (currentCharId===id) currentCharId=null; saveData(); }
function getCharacter(id) { return data.characters.find(c => c.id===id); }

function toast(msg, type='success', duration=3000) {
  const el=document.createElement('div'); el.className='toast toast-'+type;
  el.innerHTML='<span style="font-weight:700">'+(type==='success'?'✓':type==='error'?'✕':'ℹ')+'</span> '+msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(()=>el.remove(), duration);
}

function estimateTokens(text) {
  if (!text) return 0; let zh=0, en=0, punct=0, space=0;
  for (const ch of text) { const c=ch.charCodeAt(0); if (c>0x4E00&&c<=0x9FFF) zh++; else if (c>127) zh++; else if (/\s/.test(ch)) space++; else if (/[^\w\s]/.test(ch)) punct++; else en++; }
  return Math.ceil(zh/1.5 + en/4 + punct + space*0.5);
}

function parseExampleDialogue(example, cn) {
  if (!example||!example.trim()) return [];
  const pairs = [], blocks = example.split(/\n*---\n*/);
  for (const block of blocks) {
    const uR = /<用户>([\s\S]*?)(?=<[^>]+>|$)/g, rn = cn?'<'+cn+'>':'<角色>', rR = new RegExp(rn.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'([\\s\\S]*?)(?=<用户>|<角色>|$)','g'), gR = /<角色>([\s\S]*?)(?=<用户>|<角色>|$)/g;
    let uM=[], m; while((m=uR.exec(block))!==null) uM.push({text:m[1].trim(),idx:m.index}); if(!uM.length) continue;
    let rM=[]; rR.lastIndex=0; while((m=rR.exec(block))!==null) rM.push({text:m[1].trim(),idx:m.index});
    if(!rM.length){gR.lastIndex=0;while((m=gR.exec(block))!==null)rM.push({text:m[1].trim(),idx:m.index});}
    for(const um of uM){let mt=null;for(const rm of rM){if(rm.idx>um.idx){mt=rm;break;}}if(mt)pairs.push({user:um.text,assistant:mt.text});}
  }
  return pairs;
}

function getCtxInfo(id) {
  const c=getCharacter(id); if(!c) return {used:0,budget:8192,ratio:0,msgs:0};
  const budget=data.config.ctxBudget||8192, msgs=c.messages||[]; let used=0;
  used+=estimateTokens(c.systemPrompt||data.config.sysPrompt||''); if(c.example) used+=estimateTokens(c.example);
  for(const m of msgs) used+=estimateTokens(m.content);
  return {used,budget,ratio:used/budget,msgs:msgs.length};
}

function renderCharList() {
  const el=document.getElementById('charList');
  if(!data.characters.length){el.innerHTML='<div class="text-center text-gray-400 dark:text-gray-500 text-xs py-8">暂无角色<br>点击右上角 + 创建</div>';document.getElementById('charCount').textContent='0';return;}
  el.innerHTML=data.characters.map(c=>{
    const a=c.id===currentCharId, l=c.messages.length?c.messages[c.messages.length-1]:null, av=c.avatar||c.name.charAt(0);
    const isE=c.avatarType==='emoji'||(/\p{Emoji}/u.test(av)&&av.length<=4);
    const ah=isE?`<div class="w-9 h-9 rounded-full bg-primary/10 dark:bg-primary/20 flex items-center justify-center text-primary dark:text-blue-400 font-bold text-sm shrink-0 avatar-emoji">${esc(av)}</div>`:`<img src="${esc(av)}" class="w-9 h-9 rounded-full object-cover shrink-0 char-avatar-img">`;

function buildRequestMessages(c){

  if(c.example){const p=parseExampleDialogue(c.example,c.name);for(const x of p){if(x.user&&x.assistant){msgs.push({role:'user',content:x.user});msgs.push({role:'assistant',content:x.assistant});}}}
  if(c.greeting&&c.greeting.trim()&&(!c.messages||c.messages.length===0))msgs.push({role:'assistant',content:c.greeting});
  const budget=data.config.ctxBudget||8192,fixed=msgs.reduce((s,m)=>s+estimateTokens(m.content),0),reserved=Math.min(data.config.maxTokens||2048,Math.floor(budget*0.25)),remain=Math.max(budget-fixed-reserved,512);
  let hist=(c.messages||[]).map(m=>({role:m.role,content:m.content})),ht=hist.reduce((s,m)=>s+estimateTokens(m.content),0);
  while(ht>remain&&hist.length>2){const r=hist.shift();ht-=estimateTokens(r.content);}

}

document.getElementById('chatImageInput').addEventListener('change',async function(e){const f=e.target.files[0];if(!f)return;if(!currentCharId){toast('请先选择一个角色','error');return;}toast('上传图片...','info');try{const url=await uploadToImageBed(f);addMessageToChat('user','img:'+url);_autoScroll=true;closeDrawerIfMobile();toast('图片已发送','success');}catch(err){toast('图片上传失败: '+err.message,'error');}this.value='';});

// ===== STREAM RENDER =====
let _streamRenderTs=0,_streamLastText='';
function renderStreamText(st,text){_streamLastText=text;const n=Date.now();if(n-_streamRenderTs>130){_streamRenderTs=n;try{st.innerHTML=renderMd(text);st.classList.add('stream-cursor');applyHL(st);}catch(_){st.textContent=text;}}}
let _autoScroll=true;
function maybeAutoScroll(){if(_autoScroll&&chatContainer)chatContainer.scrollTop=chatContainer.scrollHeight;}
chatContainer?.addEventListener('scroll',()=>{const n=chatContainer.scrollHeight-chatContainer.scrollTop-chatContainer.clientHeight<60;_autoScroll=n;const b=document.getElementById('scrollBottomBtn');if(b)b.classList.toggle('hidden',n);});
document.getElementById('scrollBottomBtn')?.addEventListener('click',()=>{_autoScroll=true;chatContainer.scrollTop=chatContainer.scrollHeight;document.getElementById('scrollBottomBtn').classList.add('hidden');});

// ===== QUICK PROMPTS =====
const QUICK_PROMPTS=[{icon:'fa-language',label:'翻译',wrap:'请将以下内容翻译成英文，如已是英文则翻译成中文：\n\n'},{icon:'fa-list',label:'总结',wrap:'请用简洁的要点总结以下内容：\n\n'},{icon:'fa-magic',label:'润色',wrap:'请润色以下文字，使其更流畅自然：\n\n'},{icon:'fa-pencil',label:'续写',wrap:'请根据以下内容继续续写：\n\n'},{icon:'fa-code',label:'解释代码',wrap:'请解释以下代码的作用与逻辑：\n\n```\n',suffix:'\n```'},{icon:'fa-bug',label:'找Bug',wrap:'请检查以下代码是否存在问题：\n\n```\n',suffix:'\n```'},{icon:'fa-lightbulb-o',label:'头脑风暴',wrap:'请围绕以下主题进行头脑风暴：\n\n'},{icon:'fa-quote-left',label:'角色扮演',wrap:'（以当前角色口吻回应）'}];
function renderQuickBar(){const b=document.getElementById('quickBar');if(!b)return;b.innerHTML=QUICK_PROMPTS.map((p,i)=>'<button class="quick-chip" data-i="'+i+'" title="'+p.label+'"><i class="fa '+p.icon+'"></i>'+p.label+'</button>').join('');b.querySelectorAll('.quick-chip').forEach(chip=>{chip.addEventListener('click',()=>applyQuickPrompt(parseInt(chip.dataset.i)));});}
function applyQuickPrompt(i){const p=QUICK_PROMPTS[i];if(!p)return;const ta=document.getElementById('userInput'),sel=ta.value.substring(ta.selectionStart,ta.selectionEnd),b=ta.value.substring(0,ta.selectionStart),a=ta.value.substring(ta.selectionEnd);if(sel)ta.value=b+p.wrap+sel+(p.suffix||'')+a;else ta.value=(ta.value?ta.value+'\n\n':'')+p.wrap+(p.suffix||'');ta.focus();autoResizeTextarea();saveDraft();}

// ===== VOICE =====
let _recognition=null,_recognizing=false;
function initVoice(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition,btn=document.getElementById('voiceBtn');if(!SR){if(btn)btn.style.display='none';return;}_recognition=new SR();_recognition.lang='zh-CN';_recognition.interimResults=true;_recognition.continuous=false;let base='';_recognition.onstart=()=>{_recognizing=true;btn.classList.add('recording');document.getElementById('recStatus').classList.remove('hidden');base=document.getElementById('userInput').value;};_recognition.onresult=(e)=>{let inter='',fin='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal)fin+=t;else inter+=t;}const ta=document.getElementById('userInput');ta.value=base+fin+inter;autoResizeTextarea();saveDraft();};_recognition.onerror=(e)=>{toast('语音识别出错: '+(e.error||''),'error');};_recognition.onend=()=>{_recognizing=false;btn.classList.remove('recording');document.getElementById('recStatus').classList.add('hidden');};btn.addEventListener('click',()=>{if(_recognizing)_recognition.stop();else try{_recognition.start();}catch(_){}});}

// ===== TTS =====
let _speakingBtn=null;
function speakText(btn,text){if(!('speechSynthesis'in window)){toast('浏览器不支持语音合成','error');return;}if(_speakingBtn===btn){window.speechSynthesis.cancel();return;}window.speechSynthesis.cancel();const clean=text.replace(/```[\s\S]*?```/g,'（代码块）').replace(/[#*`>_~\[\]!\-]/g,' ').replace(/\s+/g,' ').trim(),u=new SpeechSynthesisUtterance(clean);u.lang=/[\u4e00-\u9fa5]/.test(clean)?'zh-CN':'en-US';u.onend=()=>{if(_speakingBtn){_speakingBtn.classList.remove('playing');_speakingBtn=null;}};u.onerror=()=>{if(_speakingBtn){_speakingBtn.classList.remove('playing');_speakingBtn=null;}};_speakingBtn=btn;btn.classList.add('playing');window.speechSynthesis.speak(u);}

// ===== CLEAR, EXPORT, STATS =====
document.getElementById('clearChatBtn')?.addEventListener('click',()=>{if(!currentCharId)return;const c=getCharacter(currentCharId);if(!c)return;if(!c.messages.length){toast('当前没有对话','info');return;}if(!confirm('确定清空「'+c.name+'」的全部对话？'))return;c.messages=[];saveData();renderChat();renderCharList();toast('对话已清空');});
document.getElementById('exportChatBtn')?.addEventListener('click',()=>{if(!currentCharId)return;const c=getCharacter(currentCharId);if(!c)return;if(!c.messages.length){toast('当前没有对话可导出','info');return;}let md='# 与 '+c.name+' 的对话\n\n';if(c.description)md+='> '+c.description+'\n\n';md+='_导出时间: '+new Date().toLocaleString('zh-CN')+'_\n\n---\n\n';for(const m of c.messages){const who=m.role==='user'?'🧑 我':'🎭 '+c.name;const time=new Date(m.ts||Date.now()).toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit'});md+='### '+who+' · '+time+'\n\n'+m.content+'\n\n';}const b=new Blob([md],{type:'text/markdown'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=c.name+'_对话_'+new Date().toISOString().slice(0,10)+'.md';a.click();URL.revokeObjectURL(u);toast('已导出 Markdown');});
document.getElementById('statsBtn')?.addEventListener('click',()=>{if(!currentCharId)return;const c=getCharacter(currentCharId);if(!c)return;const ms=c.messages||[],um=ms.filter(m=>m.role==='user'),am=ms.filter(m=>m.role==='assistant'),ut=um.reduce((s,m)=>s+estimateTokens(m.content),0),at=am.reduce((s,m)=>s+estimateTokens(m.content),0),tc=ms.reduce((s,m)=>s+(m.content||'').length,0),ctx=getCtxInfo(currentCharId),ft=ms.length?new Date(ms[0].ts||Date.now()):null,lt=ms.length?new Date(ms[ms.length-1].ts||Date.now()):null,dur=ft&&lt?Math.round((lt-ft)/60000):0;document.getElementById('statsContent').innerHTML='<div>角色名: <b>'+esc(c.name)+'</b></div><div>消息总数: <b>'+ms.length+'</b>（用户 '+um.length+' · 角色 '+am.length+'）</div><div>总字符数: <b>'+tc+'</b></div><div>Tokens: <b>'+(ut+at)+'</b>（用户 '+ut+' · 角色 '+at+'）</div><div>上下文: <b>'+Math.round(ctx.used/1000*10)/10+'k/'+Math.round(ctx.budget/1000)+'k</b>（'+Math.round(ctx.ratio*100)+'%）</div>'+(ft?'<div>开始: <b>'+ft.toLocaleString('zh-CN')+'</b></div>':'')+(lt?'<div>最近: <b>'+lt.toLocaleString('zh-CN')+'</b></div>':'')+(dur>0?'<div>跨度: <b>'+dur+'</b> 分钟</div>':'');document.getElementById('statsModal').classList.remove('hidden');});

// ===== SEARCH =====
let _searchMatches=[],_searchIdx=-1;const searchBar=document.getElementById('searchBar'),searchInput=document.getElementById('searchInput');
document.getElementById('searchToggleBtn')?.addEventListener('click',()=>{if(!currentCharId)return;searchBar.classList.toggle('hidden');if(!searchBar.classList.contains('hidden'))searchInput.focus();});
document.getElementById('searchClose')?.addEventListener('click',()=>{searchBar.classList.add('hidden');clearSearchHighlight();searchInput.value='';});
function doSearch(q){clearSearchHighlight();_searchMatches=[];_searchIdx=-1;if(!q){document.getElementById('searchCount').textContent='';return;}const l=q.toLowerCase();chatContainer.querySelectorAll('.msg-content').forEach(el=>{const w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT,null),nodes=[];let n;while(n=w.nextNode())nodes.push(n);for(const node of nodes){const t=node.nodeValue,idx=t.toLowerCase().indexOf(l);if(idx!==-1){const s=document.createElement('span');s.className='search-hit';const r=document.createRange();r.setStart(node,idx);r.setEnd(node,idx+q.length);r.surroundContents(s);_searchMatches.push(s);}}});document.getElementById('searchCount').textContent=_searchMatches.length?(_searchIdx+1)+'/'+_searchMatches.length:'无结果';if(_searchMatches.length)gotoSearchMatch(0);}
function gotoSearchMatch(i){if(!_searchMatches.length)return;_searchIdx=(i+_searchMatches.length)%_searchMatches.length;_searchMatches[_searchIdx].scrollIntoView({block:'center',behavior:'smooth'});document.getElementById('searchCount').textContent=(_searchIdx+1)+'/'+_searchMatches.length;}
function clearSearchHighlight(){chatContainer.querySelectorAll('.search-hit').forEach(el=>{const p=el.parentNode;p.replaceChild(document.createTextNode(el.textContent),el);p.normalize();});}
let _searchDebounce=null;searchInput?.addEventListener('input',()=>{clearTimeout(_searchDebounce);_searchDebounce=setTimeout(()=>doSearch(searchInput.value.trim()),200);});
document.getElementById('searchNext')?.addEventListener('click',()=>gotoSearchMatch(_searchIdx+1));document.getElementById('searchPrev')?.addEventListener('click',()=>gotoSearchMatch(_searchIdx-1));
searchInput?.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();e.shiftKey?gotoSearchMatch(_searchIdx-1):gotoSearchMatch(_searchIdx+1);}if(e.key==='Escape')document.getElementById('searchClose').click();});

// ===== DRAFT =====
const DRAFT_KEY='tavern_drafts';
function loadDrafts(){try{return JSON.parse(localStorage.getItem(DRAFT_KEY)||'{}');}catch(_){return{};}}
function saveDraft(){if(!currentCharId)return;const d=loadDrafts(),v=document.getElementById('userInput').value;if(v)d[currentCharId]=v;else delete d[currentCharId];localStorage.setItem(DRAFT_KEY,JSON.stringify(d));}
function restoreDraft(){if(!currentCharId)return;const d=loadDrafts(),ta=document.getElementById('userInput');ta.value=d[currentCharId]||'';autoResizeTextarea();}
document.getElementById('userInput').addEventListener('input',saveDraft);

function initEmojiPicker(){const g=document.getElementById('emojiGrid');if(!g)return;g.innerHTML=EMOJI_SET.map(e=>'<button type="button" data-e="'+e+'">'+e+'</button>').join('');g.querySelectorAll('button').forEach(b=>{b.addEventListener('click',()=>{document.getElementById('ceAvatar').value=b.dataset.e;document.getElementById('ceAvatarPreview').textContent=b.dataset.e;});});document.getElementById('ceAvatar').addEventListener('input',()=>{document.getElementById('ceAvatarPreview').textContent=document.getElementById('ceAvatar').value||'🎭';});document.getElementById('ceAvatarUrl').addEventListener('input',()=>{const p=document.getElementById('ceAvatarPreviewImg'),url=document.getElementById('ceAvatarUrl').value.trim(),img=p.querySelector('img');if(url){img.src=url;p.classList.remove('hidden');}else p.classList.add('hidden');});}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();if(currentCharId)document.getElementById('searchToggleBtn').click();}if(e.key==='Escape'){const sm=document.getElementById('statsModal');if(!sm.classList.contains('hidden'))sm.classList.add('hidden');}});

// ===== INIT =====
renderCharList();renderChat();renderQuickBar();initVoice();initEmojiPicker();updateLocalModelStatusUI();
</script>
